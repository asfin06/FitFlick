<h1 class="font-['Be_Vietnam_Pro'] font-bold tracking-tight text-lg uppercase text-slate-900" style="">CHECKOUT</h1>
<div class="w-6"></div> <!-- Spacer for centering -->

<main class="pt-24 pb-40 px-6 max-w-2xl mx-auto space-y-8">
<!-- Shipping Address Section -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="text-xl font-bold tracking-tight text-primary" style="">Shipping Address</h2>
</div>
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_32px_32px_rgba(26,28,28,0.04)] border border-outline-variant/10">

<p class="text-on-surface-variant text-sm leading-relaxed" style="">721 Fifth Avenue<br>New York, NY 10022</p>
<p class="text-on-surface-variant text-sm" style="">+1 (212) 555-0198</p>
</div>
<button class="text-outline text-sm font-medium hover:text-primary transition-colors" style="">Change</button>
</div>
</div>
</section>
<!-- Shipping Method Section - Bento Style Selection -->
<section class="space-y-4">
<h2 class="text-xl font-bold tracking-tight text-primary" style="">Shipping Method</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Standard -->
<label class="relative flex cursor-pointer" style="">
<input checked="" class="peer sr-only" name="shipping" type="radio" value="standard">
<div class="w-full bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/20 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary transition-all shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
<div class="flex justify-between items-start mb-2">
<span class="material-symbols-outlined text-primary" data-icon="local_shipping" style="">local_shipping</span>
<span class="text-on-tertiary-container font-bold text-xs uppercase tracking-widest bg-tertiary-fixed px-2 py-1 rounded" style="">Free</span>
</div>
<p class="font-headline font-semibold text-on-surface" style="">Standard Delivery</p>
<p class="text-xs text-on-surface-variant mt-1" style="">3-5 Business Days</p>
</div>
</label>
<!-- Express -->
<label class="relative flex cursor-pointer" style="">
<input class="peer sr-only" name="shipping" type="radio" value="express">
<div class="w-full bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/20 peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary transition-all shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
<div class="flex justify-between items-start mb-2">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="bolt" style="">bolt</span>
<span class="text-on-surface font-bold text-sm" style="">$15.00</span>
</div>
<p class="font-headline font-semibold text-on-surface" style="">Express Delivery</p>
<p class="text-xs text-on-surface-variant mt-1" style="">1-2 Business Days</p>
</div>
</label>
</div>
</section>
<!-- Payment Method Section -->
<section class="space-y-4">
<h2 class="text-xl font-bold tracking-tight text-primary" style="">Payment Method</h2>
<div class="bg-surface-container-lowest rounded-xl p-6 flex items-center justify-between shadow-[0_32px_32px_rgba(26,28,28,0.04)] border border-outline-variant/10">
<div class="flex items-center gap-4">
<div class="w-12 h-8 bg-primary-container rounded flex items-center justify-center">
<span class="text-primary-fixed text-[10px] font-black italic tracking-tighter" style="">VISA</span>
</div>
<div class="space-y-0.5">
<p class="font-headline font-bold text-on-surface" style="">Visa ending in 4242</p>
<p class="text-xs text-on-surface-variant" style="">Expires 12/26</p>
</div>
</div>
<button class="text-outline text-sm font-medium hover:text-primary transition-colors" style="">Change</button>
</div>
</section>

<section class="space-y-4 pt-4 border-t border-outline-variant/20">

<div class="bg-surface-container-low rounded-xl p-6 space-y-3">
<div class="flex justify-between text-on-surface-variant">
<span class="text-sm" style="">Subtotal</span>
<span class="font-medium" style="">$840.00</span>
</div>
<div class="flex justify-between text-on-surface-variant">
<span class="text-sm" style="">Shipping</span>
<span class="font-medium" style="">Free</span>

<span class="text-secondary font-bold text-[22px] tracking-tight" style="">$907.20</span>
