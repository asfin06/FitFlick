<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#ffddb4",
                    "on-tertiary": "#ffffff",
                    "primary-fixed": "#e2e0fc",
                    "on-tertiary-fixed-variant": "#633f00",
                    "on-primary": "#ffffff",
                    "surface-tint": "#5d5c74",
                    "inverse-on-surface": "#f1f1f1",
                    "background": "#f9f9f9",
                    "surface-variant": "#e2e2e2",
                    "surface": "#f9f9f9",
                    "secondary": "#b71d3f",
                    "tertiary-container": "#2a1800",
                    "on-surface": "#1a1c1c",
                    "on-secondary-fixed-variant": "#91002b",
                    "inverse-surface": "#2f3131",
                    "outline-variant": "#c8c5cd",
                    "primary-fixed-dim": "#c6c4df",
                    "on-secondary-fixed": "#40000e",
                    "inverse-primary": "#c6c4df",
                    "surface-dim": "#dadada",
                    "on-error": "#ffffff",
                    "on-background": "#1a1c1c",
                    "surface-container-high": "#e8e8e8",
                    "outline": "#78767d",
                    "tertiary-fixed-dim": "#ffb955",
                    "surface-bright": "#f9f9f9",
                    "primary-container": "#1a1a2e",
                    "secondary-fixed": "#ffdadb",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#45455b",
                    "on-surface-variant": "#47464c",
                    "on-tertiary-container": "#b57700",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#ffb2b7",
                    "on-tertiary-fixed": "#291800",
                    "tertiary": "#010000",
                    "on-primary-fixed": "#1a1a2e",
                    "primary": "#00000b",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#83829b",
                    "secondary-container": "#fc536d",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e2e2e2",
                    "on-secondary-container": "#5b0017",
                    "surface-container": "#eeeeee",
                    "surface-container-low": "#f3f3f3"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "16px",
                    "xl": "24px",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Be Vietnam Pro"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-transition-bg {
            background: linear-gradient(to bottom, rgba(249, 249, 249, 0.95), rgba(249, 249, 249, 0.8));
        }
        .flat-no-shadows {
            box-shadow: none;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#F9F9F9]/80 dark:bg-[#1A1A2E]/80 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full no-border tonal-transition-bg">
<div class="flex items-center w-1/4">
<button class="hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#1A1A2E] dark:text-[#F9F9F9]">arrow_back</span>
</button>
</div>
<div class="flex items-center justify-center w-2/4">
<h1 class="font-['Be_Vietnam_Pro'] font-bold tracking-tight uppercase text-lg text-[#1A1A2E] dark:text-[#F9F9F9]">EDIT PROFILE</h1>
</div>
<div class="w-1/4"></div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Profile Picture Section -->
<section class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-sm">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a stylish woman with confident expression, soft editorial lighting, high fashion photography style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCq5jJcWmuq7knYcvCjjAumyH_6kfGGL1FEi8wrCZo1HpYugfCkjPfIRNr02e5PN8CWyAvW-X00SA2jFPlB0xN8HDXmekutdF5JY0yVvwqtFwDcedVJH7-NtR1K3K0BRh1tCqb0WVvWC3n5Vu8azW5fCUNOoygVjAzMVovprX7pm5lvkbu0rXuYYv89gOP1KkvY1KFK5d5rAzucyVzirJDOMCiyI-V9Cqr_bRWRlc7glauL8OIZQxgw8C6M4PiccOzEMOhSfX9fCEtU"/>
</div>
<div class="absolute bottom-1 right-1 bg-primary text-on-primary p-2 rounded-full shadow-md cursor-pointer active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm">photo_camera</span>
</div>
</div>
<button class="mt-4 text-secondary font-semibold tracking-wide text-sm hover:opacity-80 transition-opacity">
                Change Photo
            </button>
</section>
<!-- Form Section -->
<div class="bg-surface-container-lowest rounded-lg p-6 shadow-[0_4px_32px_rgba(26,28,28,0.04)] space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">Full Name</label>
<div class="relative">
<input class="w-full h-[52px] bg-surface-container-lowest border-outline-variant/40 border-[1.5px] rounded-lg px-4 focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body text-sm text-on-surface" type="text" value="Julianne V. Moore"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">Email Address</label>
<div class="relative">
<input class="w-full h-[52px] bg-surface-container-lowest border-outline-variant/40 border-[1.5px] rounded-lg px-4 focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body text-sm text-on-surface" type="email" value="julianne.moore@archive.co"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest text-on-surface-variant uppercase ml-1">Phone Number</label>
<div class="relative">
<input class="w-full h-[52px] bg-surface-container-lowest border-outline-variant/40 border-[1.5px] rounded-lg px-4 focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body text-sm text-on-surface" type="tel" value="+1 (555) 012-3456"/>
</div>
</div>
<!-- Password Section (Tertiary/Outline) -->
<div class="pt-4">
<button class="w-full h-[52px] bg-surface-container-lowest border-2 border-primary-container text-primary-container font-bold tracking-widest text-xs uppercase rounded-lg hover:bg-primary-container/5 transition-all active:scale-[0.98]">
                    Change Password
                </button>
</div>
</div>
<!-- Privacy Toggle (Editorial Accent) -->
<div class="mt-8 px-2 flex items-center justify-between">
<div>
<h3 class="text-sm font-bold text-on-surface tracking-tight">Public Profile</h3>
<p class="text-xs text-on-surface-variant">Allow others to see your wishlist</p>
</div>
<div class="w-12 h-6 bg-primary-container rounded-full relative flex items-center px-1">
<div class="w-4 h-4 bg-white rounded-full ml-auto"></div>
</div>
</div>
<!-- Main Action -->
<div class="mt-10">
<button class="w-full h-[52px] bg-primary-container text-white font-bold tracking-widest text-sm uppercase rounded-lg shadow-lg hover:opacity-90 active:scale-[0.97] transition-all">
                SAVE CHANGES
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#FFFFFF]/80 dark:bg-[#1A1A2E]/80 backdrop-blur-xl flex justify-around items-center h-20 pb-safe w-full no-border shadow-[0_-4px_32px_rgba(26,28,28,0.04)]">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#1A1A2E] dark:hover:text-white transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined mb-1">grid_view</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium tracking-widest uppercase">ARCHIVE</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#1A1A2E] dark:hover:text-white transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined mb-1">search</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium tracking-widest uppercase">DISCOVER</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#1A1A2E] dark:hover:text-white transition-colors active:scale-90 duration-300">
<span class="material-symbols-outlined mb-1">favorite</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-medium tracking-widest uppercase">WISHLIST</span>
</button>
<button class="flex flex-col items-center justify-center text-[#1A1A2E] dark:text-white font-bold active:scale-90 duration-300">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest uppercase">PROFILE</span>
</button>
</nav>
</body></html>
