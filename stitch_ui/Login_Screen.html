<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f3f3f3",
                        "secondary-container": "#fc536d",
                        "error": "#ba1a1a",
                        "on-primary-container": "#83829b",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-container": "#5b0017",
                        "surface-container": "#eeeeee",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "primary": "#00000b",
                        "on-tertiary-fixed": "#291800",
                        "tertiary": "#010000",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#ffb2b7",
                        "on-primary-fixed": "#1a1a2e",
                        "primary-container": "#1a1a2e",
                        "secondary-fixed": "#ffdadb",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#b57700",
                        "on-primary-fixed-variant": "#45455b",
                        "on-surface-variant": "#47464c",
                        "on-error": "#ffffff",
                        "on-background": "#1a1c1c",
                        "surface-dim": "#dadada",
                        "outline": "#78767d",
                        "tertiary-fixed-dim": "#ffb955",
                        "surface-bright": "#f9f9f9",
                        "surface-container-high": "#e8e8e8",
                        "outline-variant": "#c8c5cd",
                        "primary-fixed-dim": "#c6c4df",
                        "on-surface": "#1a1c1c",
                        "on-secondary-fixed-variant": "#91002b",
                        "inverse-surface": "#2f3131",
                        "on-secondary-fixed": "#40000e",
                        "inverse-primary": "#c6c4df",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffddb4",
                        "surface-variant": "#e2e2e2",
                        "surface": "#f9f9f9",
                        "secondary": "#b71d3f",
                        "tertiary-container": "#2a1800",
                        "primary-fixed": "#e2e0fc",
                        "on-tertiary-fixed-variant": "#633f00",
                        "on-primary": "#ffffff",
                        "surface-tint": "#5d5c74",
                        "inverse-on-surface": "#f1f1f1",
                        "background": "#f9f9f9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Be Vietnam Pro"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8F8F8;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .editorial-header {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface selection:bg-secondary-container/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FFFFFF] h-[56px] flex items-center justify-between px-4">
<div class="flex items-center justify-start w-1/3">
<button class="hover:opacity-70 transition-opacity active:scale-95 duration-200" style="">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back" style="">arrow_back</span>
</button>
</div>
<div class="flex justify-center w-1/3">
<h1 class="font-headline font-semibold text-[18px] tracking-tight text-on-surface uppercase" style="">LOGIN</h1>
</div>
<div class="w-1/3"></div>
</header>
<main class="min-h-screen pt-[56px] flex flex-col px-4 pb-12">
<!-- Logo Section -->
<section class="flex flex-col items-center mt-24 mb-12">
<div class="editorial-header text-primary font-black tracking-[0.25em] text-3xl mb-12" style="">
                FitFlick
            </div>
<div class="w-full max-w-md text-center space-y-2">
<h2 class="text-on-surface font-headline font-bold text-2xl tracking-tight" style="">Welcome Back</h2>
<p class="text-on-surface-variant font-body text-sm" style="">Log in to continue shopping</p>
</div>
</section>
<!-- Form Section -->
<section class="w-full max-w-md mx-auto space-y-6">
<div class="space-y-4">
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border-[1.5px] border-surface-container rounded-xl focus:outline-none focus:border-primary transition-colors placeholder:text-outline-variant text-on-surface font-body" placeholder="Email Address" type="email">
</div>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border-[1.5px] border-surface-container rounded-xl focus:outline-none focus:border-primary transition-colors placeholder:text-outline-variant text-on-surface font-body" placeholder="Password" type="password">
</div>
<div class="flex justify-end">
<a class="text-[12px] text-on-surface-variant font-body hover:text-primary transition-colors" href="#" style="">Forgot Password?</a>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-[52px] bg-primary-container text-on-primary font-label font-semibold text-[14px] tracking-[0.1em] rounded-xl hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center uppercase" style="">
                LOGIN
            </button>
<!-- Social Login / Alternative -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-[#F8F8F8] px-4 text-outline-variant font-label tracking-widest" style="">or curate via</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-[52px] border-[1.5px] border-surface-container rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-colors" style="">
<span class="material-symbols-outlined text-on-surface" data-icon="brand_awareness" style="">brand_awareness</span>
</button>
<button class="flex items-center justify-center h-[52px] border-[1.5px] border-surface-container rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-colors" style="">
<span class="material-symbols-outlined text-on-surface" data-icon="fingerprint" style="">fingerprint</span>
</button>
</div>
</section>
<!-- Footer Link -->
<section class="mt-auto pt-12 pb-6 text-center">
<p class="text-on-surface font-body text-[14px]" style="">
                Don't have an account? <a class="font-bold hover:text-secondary transition-colors" href="#" style="">Register</a>
</p>
</section>
<!-- Decorative Background Element (Asymmetric Editorial Style) -->
<div class="fixed -bottom-24 -right-24 w-64 h-64 bg-secondary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-1/4 -left-12 w-48 h-48 bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
</main>
<!-- Visual Polish: Ghost Border Effect for inputs focused is handled via Tailwind focus: classes -->
</body></html>
