<body class="bg-surface font-body text-on-surface selection:bg-secondary/30">
<!-- TopAppBar Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center">

<h1 class="font-headline tracking-tighter uppercase font-bold text-slate-900" style="">REGISTER</h1>
</div>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<main class="min-h-screen pt-24 pb-12 px-6 max-w-lg mx-auto">
<!-- Hero Editorial Section -->
<div class="mb-12 relative overflow-hidden rounded-xl h-48 bg-surface-container-low">
<img alt="Fashion Editorial" class="w-full h-full object-cover opacity-80" data-alt="high-fashion editorial shot of luxury fabrics draped elegantly with dramatic studio lighting and soft shadows in a minimalist setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCR9jxqB8-pvR9_HDLrR2FY5xRbUbfQIhMv96YOk8Q-iEjU7Q6X5GoUXvtyvRxCIRA_AiFIAkvd6QQdKkYOzvmU0-PpD7rzSxMpnVYEDvbKipni8ad8zd1sQXzasxFSDEvlOqXYln9pO-wgc2ffNHWlL2VElWWOyBYGKn0WR6xlgq7IgTi1r0ANRipCh6bs02ab4TUZ-nx1WuNuF7Ivmi-UHxllGHXqWtMc448fRMF3LP6yRF9is0ARdqZiJxW-tPimvdCjzxAwm7O" style="">
<div class="absolute bottom-6 left-6 right-6">
<h2 class="font-headline text-3xl font-extrabold text-primary tracking-tighter uppercase leading-none" style="">
                    Join The <br>FitFlick</h2>
</div>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant px-1" style="">Full Name</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border-[1.5px] border-outline-variant/40 rounded-xl focus:ring-0 focus:border-primary-container transition-all outline-none text-on-surface placeholder:text-outline-variant" placeholder="Alexander McQueen" type="text">
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant px-1" style="">Email Address</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border-[1.5px] border-outline-variant/40 rounded-xl focus:ring-0 focus:border-primary-container transition-all outline-none text-on-surface placeholder:text-outline-variant" placeholder="alexander@archive.com" type="email">
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant px-1" style="">Password</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border-[1.5px] border-outline-variant/40 rounded-xl focus:ring-0 focus:border-primary-container transition-all outline-none text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant" type="button" style="">
<span class="material-symbols-outlined text-xl" data-icon="visibility" style="">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="text-[10px] font-bold tracking-widest uppercase text-on-surface-variant px-1" style="">Confirm Password</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-lowest border-[1.5px] border-outline-variant/40 rounded-xl focus:ring-0 focus:border-primary-container transition-all outline-none text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password">
</div>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 py-2">
<div class="h-5 w-5 rounded border border-outline-variant flex items-center justify-center bg-surface-container-lowest">
<div class="h-3 w-3 bg-primary rounded-sm opacity-0"></div>
</div>
<p class="text-xs text-on-surface-variant leading-relaxed" style="">
                    I agree to the <span class="text-primary font-bold border-b border-primary/20" style="">Terms of Service</span> and <span class="text-primary font-bold border-b border-primary/20" style="">Privacy Policy</span>.
                </p>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full h-[52px] bg-primary-container text-on-primary font-bold tracking-[0.1em] rounded-xl active:scale-95 transition-transform uppercase text-sm shadow-lg shadow-primary/10" type="submit" style="">
                    REGISTER
                </button>
</div>
</form>
<!-- Secondary Action -->
<div class="mt-12 text-center">
<p class="text-sm text-on-surface-variant" style="">
                Already have an account? 
                <a class="text-primary font-bold tracking-tight inline-block relative ml-1" href="#" style="">

</a>
</p>
</div>

<div class="mt-16 pt-12 border-t border-outline-variant/10 text-center">
<p class="font-headline italic text-on-surface-variant/40 text-sm tracking-tight px-8" style="">
                "Fashion is the armor to survive the reality of everyday life."
            </p>
</div>
