<body class="bg-primary-container font-body overflow-hidden">
<!-- Splash Screen Container -->
<!-- Applying "Automatic Suppression" rule for transactional/onboarding intent -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center editorial-gradient overflow-hidden">
<!-- Abstract Background Decorative Elements -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-secondary/5 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[100px]"></div>
</div>
<!-- Hero Content (Intentional Asymmetry via positioning) -->
<section class="relative z-10 flex flex-col items-center justify-center px-8 text-center">

<div class="mb-12 opacity-90">
<div class="w-16 h-[1px] bg-white/20 mb-8 mx-auto"></div>
</div>
<!-- Main Brand Identity -->
<div class="relative group">
<h1 class="font-headline font-black text-6xl md:text-8xl text-white text-kern-tight uppercase leading-none mb-4 transition-transform duration-700 cursor-default" style="">
                    FitFlick
                </h1>

<div class="flex flex-col items-center">
<p class="font-label text-white/60 text-kern-wide text-xs md:text-sm uppercase tracking-[0.4em] font-medium" style="">
                        Curated Elegance
                    </p>
</div>
</div>
<!-- Loading Indicator / Interaction Cue -->
<div class="mt-24 relative">
<div class="w-12 h-12 flex items-center justify-center">
<div class="absolute inset-0 border-2 border-white/10 rounded-full"></div>
<div class="w-1 h-1 bg-white rounded-full"></div>
</div>
</div>
</section>

<div class="absolute bottom-[-15%] right-[-5%] w-[300px] h-[450px] rotate-12 opacity-20 pointer-events-none hidden md:block">
<div class="w-full h-full bg-surface-container-lowest rounded-xl shadow-2xl overflow-hidden p-4">

<div class="h-3 w-1/2 bg-on-surface/5 rounded"></div>
</div>
</div>
</div>

<span class="font-label text-white/30 text-[10px] uppercase tracking-widest" style="">

</main>
